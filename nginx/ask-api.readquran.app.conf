# ----------------------
# Backend upstream (ADK API)
# ----------------------
upstream ask_quran_be {
    # Host IP + mapped ports (5 instances)
    server 127.0.0.1:7991;
    server 127.0.0.1:7992;
    server 127.0.0.1:7993;
    server 127.0.0.1:7994;
    server 127.0.0.1:7995;
}

# ----------------------
# API server block
# ----------------------
server {
    listen 80;
    server_name ask-api.readquran.app;

    # Main proxy location
    location / {
        proxy_pass http://ask_quran_be;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / long-running agent responses
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ADK already exposes /health and /version — no override needed.
}
