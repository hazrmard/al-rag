<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      padding: 5px;
    }
    .message {
      margin-bottom: 8px;
    }
    .user {
      text-align: right;
      color: blue;
    }
    .agent {
      text-align: left;
      color: green;
    }
    #input-area {
      display: flex;
    }
    #user-input {
      flex: 1;
      padding: 5px;
    }
    #send-btn {
      padding: 5px 10px;
    }
  </style>
</head>
<body>
  <h3>QuranAI Chat</h3>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Ask a question..." />
    <button id="send-btn">Send</button>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
