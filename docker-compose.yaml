services:
  api-dev:
    profiles: ["dev"]
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${QURANAI_API_PORT:-7999}:${QURANAI_API_PORT:-7999}"
    command: >
      sh -c "uv run adk api_server src/quranai/agents/ --host 0.0.0.0 --port $QURANAI_API_PORT --allow_origins '*'"
    restart: unless-stopped

  api-prod:
    profiles: ["prod"]
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${QURANAI_API_PORT:-7999}:${QURANAI_API_PORT:-7999}"
    command: >
      sh -c "uv run adk api_server src/quranai/agents/ --host 0.0.0.0 --port $QURANAI_API_PORT --allow_origins '*'"
    restart: unless-stopped
