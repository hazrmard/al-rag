services:
  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${QURANAI_API_PORT:-7999}:${QURANAI_API_PORT:-7999}"
    command: >
      sh -c "uv run adk api_server src/quranai/agents/ --host 0.0.0.0 --port $QURANAI_API_PORT --allow_origins '*'"
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./src/quranai/data/quranai.chroma:/app/src/quranai/data/quranai.chroma

  web:
    build:
      context: .
      args:
        - QURANAI_API_BASE_URL=${QURANAI_API_BASE_URL:-http://localhost:7999}
    env_file:
      - .env
    ports:
      - "${QURANAI_UI_PORT:-7998}:${QURANAI_UI_PORT:-7998}"
    command: >
      sh -c "python3 -m http.server $QURANAI_UI_PORT -d public/app -b 0.0.0.0"
    restart: unless-stopped
    volumes:
      - ./public/app:/app/public/app
