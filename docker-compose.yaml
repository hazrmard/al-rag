services:
  api-dev:
    profiles: ["dev"]
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${QURANAI_API_PORT:-7999}:${QURANAI_API_PORT:-7999}"
    command: >
      sh -c "uv run adk api_server src/quranai/agents/ --host 0.0.0.0 --port $QURANAI_API_PORT --allow_origins '*'"
    restart: unless-stopped

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      args:
        - QURANAI_API_BASE_URL=http://localhost:${QURANAI_API_PORT}
    env_file:
      - .env
    ports:
      - "${QURANAI_UI_PORT:-7998}:${QURANAI_UI_PORT:-7998}"
    command: >
      sh -c "python3 -m http.server $QURANAI_UI_PORT -d public/app"
    restart: unless-stopped

  api-prod:
    profiles: ["prod"]
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${QURANAI_API_PORT:-7999}:${QURANAI_API_PORT:-7999}"
    command: >
      sh -c "uv run adk api_server src/quranai/agents/ --host 0.0.0.0 --port $QURANAI_API_PORT --allow_origins '*'"
    restart: unless-stopped

  web-prod:
    profiles: ["prod"]
    build:
      context: .
      args:
        - QURANAI_API_BASE_URL=${QURANAI_API_BASE_URL}
    env_file:
      - .env
    ports:
      - "${QURANAI_UI_PORT:-7998}:${QURANAI_UI_PORT:-7998}"
    command: >
      sh -c "python3 -m http.server $QURANAI_UI_PORT -d public/app"
    restart: unless-stopped
